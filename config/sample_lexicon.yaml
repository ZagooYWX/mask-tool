# 敏感词词库配置
# 按类别管理敏感词，支持精确匹配
# 用户可根据实际业务需求增删词条
# 置信度: 词库匹配 = 0.95（focused模式下仅脱敏这些词）
#
# 使用说明：
#   1. 复制本文件为 lexicon.yaml（或自定义名称）
#   2. 删除示例词条，添加你自己的业务词条
#   3. 在 default.yaml 中将 lexicon_path 指向你的词库文件
#   4. 也可通过 Web 界面"学习新词"功能自动添加

company:
  # 示例：将以下替换为你业务中涉及的公司/机构名称
  - 某某建设集团有限公司
  - 某某投资有限公司
  - 某某科技有限公司

government:
  # 示例：将以下替换为你业务中涉及的政府/监管机构
  - 某某省发展和改革委员会
  - 某某市住房和城乡建设局

person:
  # 示例：将以下替换为你业务中涉及的人名
  - 张三
  - 李四

project:
  # 示例：将以下替换为你业务中涉及的项目名称
  - 某某新区基础设施建设项目
  - 某某道路改造工程

subject:
  # 示例：将以下替换为你业务中涉及的标的物/资产名称
  - 某某商业综合体
  - 某某住宅小区

location:
  # 示例：将以下替换为你业务中涉及的地名
  - 某某省某某市
  - 某某区某某路

custom:
  # 用户自定义关键词（如内部编号、代码等）
  - 内部编号XXXX-001
